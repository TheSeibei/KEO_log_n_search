    const container = document.getElementById("exhibitors-container");
    const blFilters = Array.from(document.querySelectorAll(".bl-filter"));
    const langFilters = Array.from(document.querySelectorAll(".lang-filter"));
    const districtWrap = document.getElementById("district-filter-wrap");
    const districtSelect = document.getElementById("district-filter");

    let currentFilter = null;
    const selectedLanguages = new Set();

    function formatDistrict(value) {
      const n = Number(value);
      if (!Number.isInteger(n) || n < 1 || n > 23) return null;
      return String(n).padStart(2, "0");
    }

    function populateDistrictSelect() {
      for (let i = 1; i <= 23; i += 1) {
        const option = document.createElement("option");
        option.value = String(i);
        option.textContent = `${formatDistrict(i)}.`;
        districtSelect.appendChild(option);
      }
    }

    function normalizeDistrict(district) {
      const n = Number(district);
      if (!Number.isInteger(n) || n < 1 || n > 23) return null;
      return n;
    }

    function normalizeBadges(badges) {
      const b = Array.isArray(badges) ? badges : [0, 0, 0];
      return [0, 1, 2].map(i => (b[i] === 1 ? 1 : 0));
    }

    function normalizeLanguages(languages) {
      if (!languages) return [];
      const arr = Array.isArray(languages) ? languages : [languages];
      const unique = [...new Set(arr.map(x => String(x).toUpperCase().trim()))];
      return unique.filter(code => ICONS.languages && ICONS.languages[code]);
    }

    function normalizeCertificate(certificate) {
      if (!certificate) return null;
      const link = String(certificate).trim();
      if (!link) return null;
      return toHttps(link);
    }

    function normalizePhone(phone) {
      if (!phone) return null;
      const p = String(phone).trim();
      return p.length ? p : null;
    }

    function setActiveBundesland(blOrAll) {
      blFilters.forEach(el => el.classList.remove("is-active"));
      const active = blFilters.find(el => Number(el.dataset.bl) === blOrAll);
      if (active) active.classList.add("is-active");
    }

    function setActiveLanguages() {
      langFilters.forEach(el => el.classList.remove("is-active"));
      if (selectedLanguages.size === 0) {
        const allBtn = langFilters.find(el => el.dataset.lang === "-1");
        if (allBtn) allBtn.classList.add("is-active");
        return;
      }
      selectedLanguages.forEach(code => {
        const btn = langFilters.find(el => el.dataset.lang === code);
        if (btn) btn.classList.add("is-active");
      });
    }

    function updateDistrictVisibility() {
      const showDistricts = currentBundesland === WIEN_BUNDESLAND;
      districtWrap.classList.toggle("is-hidden", !showDistricts);
      if (!showDistricts) {
        currentDistrict = -1;
        districtSelect.value = "-1";
      }
    }

    function makeIconImg(src, alt) {
      const img = document.createElement("img");
      img.className = "exhibitor-icon";
      img.src = toHttps(src);
      img.alt = alt;
      applyImgFallback(img);
      return img;
    }

    function makeFlagImg(code, exhibitorName) {
      const img = document.createElement("img");
      img.className = "exhibitor-flag";
      img.src = toHttps(ICONS.languages[code]);
      img.alt = `${exhibitorName} Sprache ${code}`;
      img.title = code;
      applyImgFallback(img);
      return img;
    }

    function makePlaceholder() {
      const ph = document.createElement("div");
      ph.className = "exhibitor-icon-placeholder";
      return ph;
    }

    function makeCertificateSlot(exhibitor) {
      const certLink = normalizeCertificate(exhibitor.certificate);
      const wrap = document.createElement(certLink ? "a" : "span");
      wrap.className = "exhibitor-cert";
      wrap.title = certLink ? "Zertifikat" : "Zertifikat nicht vorhanden";

      if (certLink) {
        wrap.href = certLink;
        wrap.target = "_blank";
        wrap.rel = "noopener noreferrer";
        wrap.addEventListener("click", (e) => e.stopPropagation());
        wrap.addEventListener("keydown", (e) => e.stopPropagation());
      } else {
        wrap.setAttribute("aria-disabled", "true");
        wrap.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
        });
        wrap.addEventListener("keydown", (e) => {
          e.preventDefault();
          e.stopPropagation();
        });
      }

      const img = document.createElement("img");
      img.className = "exhibitor-icon";
      img.src = toHttps(certLink ? ICONS.certificate.available : ICONS.certificate.missing);
      img.alt = certLink ? `${exhibitor.name} Zertifikat` : `${exhibitor.name} Zertifikat nicht vorhanden`;
      applyImgFallback(img);

      wrap.appendChild(img);
      return wrap;
    }

    function makeFlipButton(cardEl) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "exhibitor-flip-btn";
      btn.title = "Telefon anzeigen";
      btn.setAttribute("aria-label", "Telefon anzeigen");
      btn.setAttribute("aria-hidden", "false");
      btn.innerHTML = `<img src="http://keo.at/wp-content/uploads/2026/02/sirene.png" alt="Telefon anzeigen">`;

      const flip = () => {
        cardEl.classList.toggle("is-flipped");
        btn.setAttribute("aria-hidden", cardEl.classList.contains("is-flipped") ? "true" : "false");
      };

      btn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        flip();
      });

      btn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          e.stopPropagation();
          flip();
        }
      });

      return btn;
    }

    function createBackFace(exhibitor, cardEl) {
      const back = document.createElement("div");
      back.className = "exhibitor-face exhibitor-back";

      const panel = document.createElement("div");
      panel.className = "exhibitor-back-panel";

      const left = document.createElement("div");
      left.className = "exhibitor-back-left";

      const logo = document.createElement("img");
      logo.className = "exhibitor-logo";
      logo.src = toHttps(exhibitor.logo);
      logo.alt = `${exhibitor.name} logo`;
      applyImgFallback(logo);

      const phoneBlock = document.createElement("div");
      const phone = document.createElement("div");
      phone.className = "exhibitor-phone";

      const phoneValue = normalizePhone(exhibitor.phone);
      phone.textContent = phoneValue ? phoneValue : "Telefonnummer nicht verfügbar";
      phoneBlock.appendChild(phone);

      left.appendChild(logo);
      left.appendChild(phoneBlock);

      const actions = document.createElement("div");
      actions.className = "exhibitor-back-actions";

      const backBtn = document.createElement("button");
      backBtn.type = "button";
      backBtn.className = "exhibitor-btn";
      backBtn.textContent = "Zurück";

      const flipBack = () => {
        cardEl.classList.remove("is-flipped");
      };

      backBtn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        flipBack();
      });

      backBtn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          e.stopPropagation();
          flipBack();
        }
      });

      actions.appendChild(backBtn);

      if (phoneValue) {
        const callLink = document.createElement("a");
        callLink.className = "exhibitor-btn primary";
        callLink.textContent = "Anrufen";
        callLink.href = "tel:" + phoneValue.replace(/[^+\d]/g, "");
        callLink.addEventListener("click", (e) => e.stopPropagation());
        actions.appendChild(callLink);
      }

      panel.appendChild(left);
      panel.appendChild(actions);
      back.appendChild(panel);
      return back;
    }

    function createExhibitorCard(exhibitor) {
      const card = document.createElement("div");
      card.className = "exhibitor-card";

      const inner = document.createElement("div");
      inner.className = "exhibitor-card-inner";

      const front = document.createElement("div");
      front.className = "exhibitor-face exhibitor-front";

      const row = document.createElement("a");
      row.className = "exhibitor-row";
      row.href = exhibitor.website;
      row.target = "_blank";
      row.rel = "noopener noreferrer";

      const logo = document.createElement("img");
      logo.className = "exhibitor-logo";
      logo.src = toHttps(exhibitor.logo);
      logo.alt = `${exhibitor.name} logo`;
      applyImgFallback(logo);

      const details = document.createElement("div");
      details.className = "exhibitor-details";

      const name = document.createElement("div");
      name.className = "exhibitor-name";
      name.textContent = exhibitor.name;

      const subtitle = document.createElement("div");
      subtitle.className = "exhibitor-subtitle";
      subtitle.textContent = exhibitor.subtitle;

      details.appendChild(name);
      details.appendChild(subtitle);

      const langsWrap = document.createElement("div");
      langsWrap.className = "exhibitor-languages";
      const langs = normalizeLanguages(exhibitor.languages);
      langs.forEach(code => langsWrap.appendChild(makeFlagImg(code, exhibitor.name)));

      const iconsWrap = document.createElement("div");
      iconsWrap.className = "exhibitor-icons";

      const iconsLeft = document.createElement("div");
      iconsLeft.className = "exhibitor-icons-left";

      const iconsRight = document.createElement("div");
      iconsRight.className = "exhibitor-icons-right";

      const b = normalizeBadges(exhibitor.badges);
      b.forEach((hasBadge, idx) => {
        if (hasBadge === 1) {
          iconsLeft.appendChild(makeIconImg(ICONS.badgeIcons[idx], `${exhibitor.name} badge ${idx + 1}`));
        } else {
          iconsLeft.appendChild(makePlaceholder());
        }
      });

      const bundeslandIndex =
        Number.isInteger(exhibitor.bundesland) && exhibitor.bundesland >= 0 && exhibitor.bundesland <= 8
          ? exhibitor.bundesland
          : 0;

      iconsRight.appendChild(
        makeIconImg(ICONS.bundeslaender[bundeslandIndex], `${exhibitor.name} Bundesland Wappen`)
      );
      iconsRight.appendChild(makeCertificateSlot(exhibitor));

      iconsWrap.appendChild(iconsLeft);
      iconsWrap.appendChild(iconsRight);

      row.appendChild(logo);
      row.appendChild(details);
      row.appendChild(langsWrap);
      row.appendChild(iconsWrap);

      front.appendChild(row);
      front.appendChild(makeFlipButton(card));

      const back = createBackFace(exhibitor, card);

      inner.appendChild(front);
      inner.appendChild(back);
      card.appendChild(inner);

      return card;
    }

    function displayExhibitors(filterLetter) {
      container.innerHTML = "";

      const filtered = exhibitors
        .filter(e => {
          const okLetter = filterLetter
            ? e.name.toUpperCase().startsWith(filterLetter.toUpperCase())
            : true;

          const blValue = Number.isInteger(e.bundesland) ? e.bundesland : 0;
          const okBundesland = currentBundesland === -1 ? true : blValue === currentBundesland;

          const districtValue = normalizeDistrict(e.district);
          const okDistrict = currentBundesland === WIEN_BUNDESLAND && currentDistrict !== -1
            ? districtValue === currentDistrict
            : true;

          const langs = normalizeLanguages(e.languages);
          const okLanguage = selectedLanguages.size === 0
            ? true
            : Array.from(selectedLanguages).some(code => langs.includes(code));

          return okLetter && okBundesland && okDistrict && okLanguage;
        })
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name, "de", { sensitivity: "base" }));

      const grid = document.createElement("div");
      grid.className = "exhibitor-grid";
      container.appendChild(grid);

      filtered.forEach(exhibitor => {
        grid.appendChild(createExhibitorCard(exhibitor));
      });
    }

    blFilters.forEach(filterEl => {
      filterEl.addEventListener("click", () => {
        const bl = Number(filterEl.dataset.bl);
        if (currentBundesland === bl) {
          currentBundesland = -1;
          setActiveBundesland(-1);
        } else {
          currentBundesland = bl;
          setActiveBundesland(bl);
        }

        updateDistrictVisibility();
        displayExhibitors(currentFilter);
      });
    });

    langFilters.forEach(filterEl => {
      filterEl.addEventListener("click", () => {
        const lang = String(filterEl.dataset.lang || "").toUpperCase();

        if (lang === "-1") {
          selectedLanguages.clear();
          setActiveLanguages();
          displayExhibitors(currentFilter);
          return;
        }

        if (selectedLanguages.has(lang)) {
          selectedLanguages.delete(lang);
        } else {
          selectedLanguages.add(lang);
        }

        setActiveLanguages();
        displayExhibitors(currentFilter);
      });
    });

    districtSelect.addEventListener("change", () => {
      currentDistrict = Number(districtSelect.value);
      displayExhibitors(currentFilter);
    });

    populateDistrictSelect();
    setActiveBundesland(-1);
    setActiveLanguages();
    updateDistrictVisibility();
    displayExhibitors(null);
  });
</script>
